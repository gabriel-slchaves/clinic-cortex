name: cliniccortex

services:
  app:
    container_name: cliniccortex
    build:
      context: .
      target: runtime
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      - whatsapp-connector
    restart: unless-stopped

  n8n:
    container_name: cliniccortex-n8n
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      TZ: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n

  whatsapp-connector:
    container_name: cliniccortex-whatsapp
    build:
      context: .
      dockerfile: whatsapp-service/Dockerfile
      target: runtime
    depends_on:
      - n8n
    environment:
      SUPABASE_URL: ${VITE_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WHATSAPP_SERVICE_PORT: 3001
      WHATSAPP_SESSION_DIR: /data/sessions
      N8N_MESSAGE_WEBHOOK_URL: ${N8N_MESSAGE_WEBHOOK_URL:-http://n8n:5678/webhook/cliniccortex-whatsapp}
      N8N_MESSAGE_WEBHOOK_TIMEOUT_MS: ${N8N_MESSAGE_WEBHOOK_TIMEOUT_MS:-15000}
      N8N_MESSAGE_WEBHOOK_SECRET: ${N8N_MESSAGE_WEBHOOK_SECRET:-}
    restart: unless-stopped
    volumes:
      - whatsapp_sessions:/data/sessions

volumes:
  n8n_data:
  whatsapp_sessions:
