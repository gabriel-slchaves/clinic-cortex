name: ${STACK_NAME:-cliniccortex-hostinger}

services:
  proxy:
    container_name: cliniccortex-wa-proxy-${COMPOSE_SUFFIX:-hml}
    image: caddy:2.10-alpine
    depends_on:
      team-service:
        condition: service_healthy
    environment:
      WA_PUBLIC_HOSTNAME: ${WA_PUBLIC_HOSTNAME}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "${WA_PROXY_HTTP_PORT:-80}:80"
      - "${WA_PROXY_HTTPS_PORT:-443}:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --no-check-certificate --header \"Host: $$WA_PUBLIC_HOSTNAME\" https://127.0.0.1/health/proxy >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  team-service:
    container_name: cliniccortex-team-${COMPOSE_SUFFIX:-hml}
    build:
      context: ../..
      dockerfile: team-service/Dockerfile
      target: runtime
    environment:
      APP_ENV: ${APP_ENV}
      SUPABASE_URL: ${VITE_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      PUBLIC_APP_ORIGIN: ${VITE_PUBLIC_APP_ORIGIN}
      PUBLIC_WA_ORIGIN: ${VITE_INTERNAL_SERVICE_ORIGIN}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v23.0}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID}
      META_EMBEDDED_SIGNUP_REDIRECT_URI: ${META_EMBEDDED_SIGNUP_REDIRECT_URI}
      META_EMBEDDED_SIGNUP_SCOPES: ${META_EMBEDDED_SIGNUP_SCOPES:-business_management,whatsapp_business_management,whatsapp_business_messaging}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      META_WEBHOOK_APP_SECRET: ${META_WEBHOOK_APP_SECRET}
      WHATSAPP_TOKEN_ENCRYPTION_KEY: ${WHATSAPP_TOKEN_ENCRYPTION_KEY}
      WHATSAPP_ENABLE_WORKERS: ${WHATSAPP_ENABLE_WORKERS:-false}
      WHATSAPP_ENABLE_AGENT: ${WHATSAPP_ENABLE_AGENT:-false}
      WHATSAPP_DRAIN_TOKEN: ${WHATSAPP_DRAIN_TOKEN:-}
      WHATSAPP_DRAIN_BATCH_SIZE: ${WHATSAPP_DRAIN_BATCH_SIZE:-10}
      WHATSAPP_AGENT_HISTORY_LIMIT: ${WHATSAPP_AGENT_HISTORY_LIMIT:-16}
      WHATSAPP_AGENT_MODEL: ${WHATSAPP_AGENT_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TEAM_SERVICE_PORT: 3002
      TEAM_SERVICE_LOG_LEVEL: ${TEAM_SERVICE_LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:${TEAM_SERVICE_HOST_PORT:-3002}:3002"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
