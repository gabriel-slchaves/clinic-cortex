name: cliniccortex-dev-stack

services:
  app:
    container_name: cliniccortex-dev
    build:
      context: .
      target: dev
    command: >
      sh -c "pnpm install --frozen-lockfile && pnpm dev"
    depends_on:
      - n8n
      - team-service
    ports:
      - "3000:3000"
    environment:
      VITE_APP_ENV: ${VITE_APP_ENV:-local}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      VITE_PUBLIC_LANDING_ORIGIN: ${VITE_PUBLIC_LANDING_ORIGIN:-http://localhost:3000}
      VITE_PUBLIC_APP_ORIGIN: ${VITE_PUBLIC_APP_ORIGIN:-http://app.localhost:3000}
      VITE_INTERNAL_SERVICE_ORIGIN: ${VITE_INTERNAL_SERVICE_ORIGIN:-}
      WHATSAPP_API_PROXY_TARGET: ${WHATSAPP_API_PROXY_TARGET:-http://n8n:5678}
      TEAM_API_PROXY_TARGET: ${TEAM_API_PROXY_TARGET:-http://team-service:3002}
      # Better file watching inside Docker (esp. on Windows/macOS)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "120"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - node_modules:/app/node_modules

  n8n:
    container_name: cliniccortex-n8n-dev
    image: n8nio/n8n:latest
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-n8n}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/}
      SUPABASE_URL: ${VITE_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v23.0}
      META_EMBEDDED_SIGNUP_CONFIG_ID: ${META_EMBEDDED_SIGNUP_CONFIG_ID:-}
      META_EMBEDDED_SIGNUP_REDIRECT_URI: ${META_EMBEDDED_SIGNUP_REDIRECT_URI:-}
      META_EMBEDDED_SIGNUP_SCOPES: ${META_EMBEDDED_SIGNUP_SCOPES:-business_management,whatsapp_business_management,whatsapp_business_messaging}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
      META_WEBHOOK_APP_SECRET: ${META_WEBHOOK_APP_SECRET:-}
      WHATSAPP_TOKEN_ENCRYPTION_KEY: ${WHATSAPP_TOKEN_ENCRYPTION_KEY:-}
      TEAM_SERVICE_INTERNAL_URL: ${TEAM_SERVICE_INTERNAL_URL:-http://team-service:3002}
      NODE_FUNCTION_ALLOW_BUILTIN: ${NODE_FUNCTION_ALLOW_BUILTIN:-crypto,node:crypto}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
      TZ: ${GENERIC_TIMEZONE:-America/Sao_Paulo}
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n

  team-service:
    container_name: cliniccortex-team-dev
    build:
      context: .
      dockerfile: team-service/Dockerfile
      target: dev
    ports:
      - "${TEAM_SERVICE_PORT:-3002}:3002"
    environment:
      SUPABASE_URL: ${VITE_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
      TEAM_SERVICE_PORT: 3002
      TEAM_SERVICE_LOG_LEVEL: ${TEAM_SERVICE_LOG_LEVEL:-info}
    volumes:
      - ./team-service:/app/team-service
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - node_modules:/app/node_modules

volumes:
  node_modules:
    name: cliniccortex_node_modules
  n8n_data:
    name: cliniccortex_n8n_data
