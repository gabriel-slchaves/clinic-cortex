{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-xl 
                bg-white/5 backdrop-blur-2xl 
                border border-white/10 
                rounded-3xl p-12 shadow-2xl">

        <!-- Header -->
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-semibold tracking-tight">
                {{ view.object|yesno:"Editar Paciente,Novo Paciente" }}
            </h2>
            <p class="text-gray-400 text-sm mt-2">
                Preencha as informações abaixo
            </p>
        </div>

        <!-- Form -->
        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
            <div class="flex flex-col gap-2">

                <label class="text-sm text-gray-400">
                    {{ field.label }}
                </label>

                {{ field }}

                {% if field.errors %}
                <p class="text-red-400 text-xs">
                    {{ field.errors|striptags }}
                </p>
                {% endif %}

            </div>
            {% endfor %}

            <!-- Buttons -->
            <div class="pt-8 flex justify-between items-center">

                <a href="{% url 'patient_list' %}"
                   class="text-gray-400 hover:text-white transition">
                    Cancelar
                </a>

                <button type="submit"
                        class="bg-emerald-500 text-black px-8 py-3 rounded-xl font-medium
                               hover:scale-105 hover:shadow-lg hover:shadow-emerald-500/30
                               transition-all duration-300">
                    Salvar
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
