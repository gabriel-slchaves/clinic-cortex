{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>ClinicCortex • Login</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Inter, sans-serif;
            background: radial-gradient(circle at center, #0b1412 0%, #050807 60%, #000000 100%);
        }

        .center-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.25) 0%, transparent 60%);
            filter: blur(120px);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            z-index: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
        }

        .btn-glow {
            background: linear-gradient(90deg, #0f3d2e, #145c47, #0f3d2e);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.25);
            transition: all .25s ease;
        }

        .btn-glow:hover {
            background: linear-gradient(90deg, #10b981, #09835a, #0d684a);
            box-shadow: 0 0 45px rgba(16, 185, 129, 0.55);
            transform: translateY(-2px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all .3s ease;
        }

        .input-field:focus {
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.25);
            outline: none;
        }

        .input-wrapper:focus-within svg {
            color: rgb(16 185 129);
            transform: scale(1.05);
        }

        .input-wrapper svg {
            transition: all .25s ease;
        }

        .error-box {
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center text-white relative overflow-hidden">

    <div class="center-glow"></div>

    <div class="relative z-10 glass-card w-full max-w-md rounded-3xl px-10 py-12">
        <img src="{% static 'images/logo.png' %}" class="mx-auto w-64 mb-6">

        <h2 class="text-center text-lg text-neutral-300 mb-8 tracking-wide">
            Faça login na sua conta
        </h2>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% if form.errors %}
            <div class="error-box text-red-400 text-sm p-3 rounded-xl text-center">
                Credenciais inválidas.
            </div>
            {% endif %}

            <!-- EMAIL -->
            <div>
                <label class="text-sm text-neutral-400 block mb-2">Email</label>

                <div class="relative input-wrapper">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="1.8"
                             stroke-linecap="round"
                             stroke-linejoin="round"
                             class="w-5 h-5 text-neutral-400">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <path d="M3 7l9 6 9-6"/>
                        </svg>
                    </div>

                    <input type="email"
                           name="username"
                           class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-neutral-500"
                           placeholder="Digite seu E-mail"
                           required>
                </div>
            </div>

            <!-- PASSWORD -->
            <div>
                <label class="text-sm text-neutral-400 block mb-2">Password</label>

                <div class="relative input-wrapper">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="1.8"
                             stroke-linecap="round"
                             stroke-linejoin="round"
                             class="w-5 h-5 text-neutral-400">
                            <rect x="4" y="11" width="16" height="9" rx="2"/>
                            <path d="M8 11V7a4 4 0 018 0v4"/>
                        </svg>
                    </div>

                    <input type="password"
                           name="password"
                           class="input-field w-full pl-12 pr-4 py-3 rounded-xl text-white placeholder-neutral-500"
                           placeholder="••••••••"
                           required>
                </div>
            </div>

            <div class="text-right text-sm text-neutral-500 hover:text-emerald-400 transition cursor-pointer">
                Forgot your password?
            </div>

            <button type="submit"
                class="btn-glow w-full py-3 rounded-xl text-emerald-100 font-medium mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center text-sm text-neutral-500 mt-8">
            Don't have an account?
            <span class="text-emerald-400 hover:text-emerald-300 cursor-pointer transition">
                Register
            </span>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="absolute bottom-8 text-neutral-600 text-sm">
        Powered by <span class="text-emerald-400">Sinapse Company</span>
    </div>

</body>
</html>
